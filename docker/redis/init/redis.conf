# BrainSpark Redis 配置文件
# 基于 docs/architecture/data-model.md 定义

# 基本配置
daemonize no
pidfile /var/run/redis_6379.pid
loglevel notice
logfile ""

# 网络配置
bind 0.0.0.0
port 6379
tcp-backlog 511
tcp-keepalive 300
timeout 300

# 安全配置
requirepass brainspark_dev

# 内存管理
maxmemory 2gb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# 持久化配置 - RDB
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# 性能优化
hz 10
lfu-log-factor 10
lfu-decay-time 1

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 客户端连接
maxclients 10000
timeout 0