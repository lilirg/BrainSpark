# BrainSpark Redis 开发环境配置

# 绑定所有网络接口（仅开发环境）
bind 0.0.0.0

# 保护模式（开发环境关闭）
protected-mode no

# 端口
port 6379

# 关闭持久化（开发环境，重启后数据丢失）
save ""
appendonly no

# 最大内存限制
maxmemory 256mb
maxmemory-policy allkeys-lru

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 连接数
maxclients 1000
timeout 0

# 日志级别
loglevel notice
logfile ""

# 数据库数量
databases 16