server:
  port: 8080

spring:
  application:
    name: backend-business

  # Database - Docker MySQL 8.0
  datasource:
    url: jdbc:mysql://localhost:3306/brainspark?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:brainspark_dev}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        default_schema: users_schema

  # MongoDB - Docker MongoDB 7
  data:
    mongodb:
      uri: mongodb://root:brainspark_dev@localhost:27017/brainspark_behavior

  # Redis - Docker Redis 7
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:brainspark_redis}
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

# JWT Configuration
jwt:
  secret: brainspark-jwt-secret-key-change-in-production-must-be-at-least-256-bits
  access-expiration: 3600  # 1小时（秒）
  refresh-expiration: 604800  # 7天（秒）

# Custom
brainspark:
  ai:
    api-url: ${AI_API_URL:http://localhost:8001}