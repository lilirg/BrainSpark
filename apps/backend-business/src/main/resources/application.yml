server:
  port: 8080

spring:
  application:
    name: backend-business

  # Database - Docker MySQL 8.0
  datasource:
    url: jdbc:mysql://localhost:3306/brainspark?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:brainspark_dev}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # MongoDB - Docker MongoDB 7
  data:
    mongodb:
      uri: mongodb://root:brainspark_dev@localhost:27017/brainspark_behavior

  # Redis - Docker Redis 7
  redis:
    host: localhost
    port: 6379
    password: brainspark_redis
    timeout: 5000

  # Security (JWT)
  security:
    jwt:
      secret: ${JWT_SECRET:dev-jwt-secret-key-do-not-use-in-production}
      expiration: 86400000

# Custom
brainspark:
  ai:
    api-url: ${AI_API_URL:http://localhost:8001}